<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <rect width="100" height="100" fill="#2A1A0E"/>
  <!-- Body -->
  <ellipse cx="50" cy="88" rx="26" ry="16" fill="#AA7848"/>
  <!-- Neck -->
  <rect x="44" y="64" width="12" height="14" rx="4" fill="#AA7848"/>
  <!-- Head -->
  <ellipse cx="50" cy="52" rx="20" ry="22" fill="#AA7848"/>
  <!-- Hair buzz cut -->
  <ellipse cx="50" cy="31" rx="20" ry="8" fill="#0A0600"/>
  <!-- Eyes -->
  <ellipse cx="43" cy="51" rx="3" ry="3.5" fill="#0A0600"/>
  <ellipse cx="57" cy="51" rx="3" ry="3.5" fill="#0A0600"/>
  <ellipse cx="43.8" cy="50.2" rx="1" ry="1.2" fill="white" opacity="0.6"/>
  <ellipse cx="57.8" cy="50.2" rx="1" ry="1.2" fill="white" opacity="0.6"/>
  <!-- Eyebrows thick -->
  <path d="M39.5 45.5 Q43 43.5 46.5 45.5" stroke="#0A0600" stroke-width="2" stroke-linecap="round"/>
  <path d="M53.5 45.5 Q57 43.5 60.5 45.5" stroke="#0A0600" stroke-width="2" stroke-linecap="round"/>
  <!-- Nose -->
  <path d="M47 53 Q50 58 53 53" stroke="#7A4820" stroke-width="1.3" stroke-linecap="round" fill="none"/>
  <!-- Mouth -->
  <path d="M45 62 Q50 65.5 55 62" stroke="#6A3010" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <text x="50" y="97" text-anchor="middle" font-size="5" fill="#D4A853" font-family="monospace" opacity="0.8">AVATAR</text>
