<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <rect width="100" height="100" fill="#0E1A2A"/>
  <!-- Body -->
  <ellipse cx="50" cy="88" rx="26" ry="16" fill="#B07D55"/>
  <!-- Neck -->
  <rect x="44" y="64" width="12" height="14" rx="4" fill="#B07D55"/>
  <!-- Head -->
  <ellipse cx="50" cy="52" rx="20" ry="22" fill="#B07D55"/>
  <!-- Hair (short) -->
  <ellipse cx="50" cy="32" rx="20" ry="9" fill="#0D0A06"/>
  <!-- Eyes -->
  <ellipse cx="43" cy="51" rx="3" ry="3.5" fill="#0D0A06"/>
  <ellipse cx="57" cy="51" rx="3" ry="3.5" fill="#0D0A06"/>
  <ellipse cx="43.8" cy="50.2" rx="1" ry="1.2" fill="white" opacity="0.6"/>
  <ellipse cx="57.8" cy="50.2" rx="1" ry="1.2" fill="white" opacity="0.6"/>
  <!-- Eyebrows -->
  <path d="M40 46 Q43 44 46 46" stroke="#0D0A06" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M54 46 Q57 44 60 46" stroke="#0D0A06" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Nose -->
  <path d="M48 54 Q50 58 52 54" stroke="#8A5A35" stroke-width="1.2" stroke-linecap="round" fill="none"/>
  <!-- Mouth smile -->
  <path d="M44 62 Q50 66 56 62" stroke="#7A3A1A" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <text x="50" y="97" text-anchor="middle" font-size="5" fill="#D4A853" font-family="monospace" opacity="0.8">AVATAR</text>
</svg>
